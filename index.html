<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acierte los Colores - Mastermind Pro</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0f0814",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                background: rgba(255, 255, 255, 0.03);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .neo-glow-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
            .neo-glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
            .neo-glow-yellow { box-shadow: 0 0 15px rgba(234, 179, 8, 0.4); }
            .neo-glow-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
            
            .sphere-3d {
                background: radial-gradient(circle at 30% 30%, var(--tw-gradient-from), var(--tw-gradient-to));
                box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4), 2px 4px 8px rgba(0,0,0,0.3);
                transition: transform 0.2s ease, box-shadow 0.2s ease;
            }
            .sphere-3d:active {
                transform: scale(0.92);
            }
            
            .history-circle {
                width: 1.25rem;
                height: 1.25rem;
                border-radius: 9999px;
                border: 2px solid rgba(255, 255, 255, 0.2);
                background-color: rgba(255, 255, 255, 0.05);
                transition: all 500ms;
            }
            .history-circle.filled {
                border-color: transparent;
                box-shadow: inset -2px -2px 5px rgba(0,0,0,0.4), 1px 2px 4px rgba(0,0,0,0.3);
            }

            .custom-scrollbar::-webkit-scrollbar { width: 4px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(236, 91, 19, 0.3); border-radius: 10px; }

            .mystery-slot {
                aspect-ratio: 1 / 1;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 0.75rem;
                background-color: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: rgba(255, 255, 255, 0.2);
                transition: all 700ms;
            }
            .mystery-slot.revealed {
                border-color: transparent;
                transform: scale(1.1);
                box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4), 2px 4px 8px rgba(0,0,0,0.3);
            }

            @keyframes popIn {
                0% { transform: scale(0.5); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }
            .animate-pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        }
    </style>
</head>

<body class="font-display bg-background-dark text-slate-100 h-screen overflow-hidden selection:bg-primary/30">
    <div class="relative h-full flex flex-col bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-from),_transparent_50%),_radial-gradient(circle_at_bottom_left,_var(--tw-gradient-from),_transparent_50%)] from-primary/10 via-background-dark to-primary/5">
        
        <main class="flex-1 max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full min-h-0 overflow-hidden">
            
            <!-- Side Panel: History -->
            <aside class="lg:col-span-4 flex flex-col min-h-0 py-2">
                <div class="flex items-center justify-between mb-4 shrink-0">
                    <h3 class="text-sm font-bold flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary text-xl">history</span>
                        INTENTOS
                    </h3>
                    <span id="attempt-badge" class="text-[10px] font-bold px-3 py-1 rounded-full bg-primary/20 text-primary uppercase tracking-wider">INTENTO: 01</span>
                </div>
                
                <div id="history-grid" class="flex-1 space-y-2 overflow-y-auto pr-3 custom-scrollbar">
                    <!-- 10 rows will be injected here via JS -->
                </div>
            </aside>

            <!-- Main Interaction Zone -->
            <section class="lg:col-span-8 flex flex-col justify-center gap-6 min-h-0 py-2">
                
                <div class="text-center shrink-0">
                    <!-- Dynamic Headers -->
                    <div id="victory-header" style="display: none;" class="animate-pop mb-2">
                        <h2 class="text-4xl font-black text-yellow-400 tracking-tighter shadow-yellow-500/20">¡FELICITACIONES!</h2>
                    </div>
                    <div id="failure-header" style="display: none;" class="animate-pop mb-2">
                        <h2 class="text-4xl font-black text-red-500 tracking-tighter">¡FIN DEL JUEGO!</h2>
                    </div>
                    
                    <h1 id="game-title" class="text-3xl font-black tracking-tighter text-white mb-4 uppercase">
                        Descubre el <span class="text-primary italic">Orden</span>
                    </h1>

                    <!-- Hidden Sequence (Solution) -->
                    <div class="glass-panel rounded-3xl p-5 max-w-md mx-auto border-dashed border-2 border-white/20">
                        <div id="hidden-zone" class="grid grid-cols-4 gap-4">
                            <div class="mystery-slot" data-index="0">
                                <span class="material-symbols-outlined text-3xl">question_mark</span>
                            </div>
                            <div class="mystery-slot" data-index="1">
                                <span class="material-symbols-outlined text-3xl">question_mark</span>
                            </div>
                            <div class="mystery-slot" data-index="2">
                                <span class="material-symbols-outlined text-3xl">question_mark</span>
                            </div>
                            <div class="mystery-slot" data-index="3">
                                <span class="material-symbols-outlined text-3xl">question_mark</span>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <p id="feedback" class="text-sm text-slate-400 font-medium italic">
                            Para comenzar selecciona los colores en el orden deseado...
                        </p>
                    </div>
                </div>

                <!-- Color Selection Pool -->
                <div id="selection-container" class="glass-panel rounded-3xl p-6 bg-white/5 border-white/10 shrink-0 mx-auto w-full max-w-md shadow-2xl">
                    <div id="player-slots" class="flex justify-center gap-6">
                        <!-- Tokens injected via JS -->
                    </div>
                    
                    <!-- Reset Button (Hidden usually) -->
                    <div id="reset-container" class="mt-6 flex justify-center" style="display: none;">
                        <button onclick="location.reload()" class="px-8 py-3 bg-primary text-white font-black text-sm rounded-full shadow-[0_0_20px_rgba(236,91,19,0.3)] hover:shadow-[0_0_30px_rgba(236,91,19,0.5)] hover:scale-105 transition-all uppercase tracking-widest">
                            Jugar de Nuevo
                        </button>
                    </div>
                </div>

            </section>
        </main>

        <!-- Background Decorative Orbs -->
        <div class="absolute -top-[5%] -left-[5%] size-[400px] bg-primary/20 blur-[120px] rounded-full pointer-events-none"></div>
        <div class="absolute -bottom-[5%] -right-[5%] size-[500px] bg-blue-600/10 blur-[150px] rounded-full pointer-events-none"></div>
    </div>

    <!-- Logic Script -->
    <script src="script.js"></script>
</body>

</html>
