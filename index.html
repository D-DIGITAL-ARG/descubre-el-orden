<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acierte los Colores - Mastermind Pro</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="font-display bg-background-dark text-slate-100 h-screen overflow-hidden selection:bg-primary/30">
    <div class="relative h-full flex flex-col bg-gradient-radial">

        <!-- MAIN: En móvil es un bloque, en LG es un grid de 12 columnas estrictas -->
        <main
            class="flex-1 max-w-7xl mx-auto px-4 py-1 w-full min-h-0 overflow-hidden lg:grid lg:grid-cols-2">

            <!-- COLUMNA IZQUIERDA (Historial) -->
            <aside class="flex flex-col lg:max-h-full min-h-0 lg:py-8 lg:px-8">
                <div class="flex flex-col items-center py-2 px-2 shrink-0">
                    <span id="attempt-badge"
                        class="text-base lg:text-lg font-black px-4 py-1 rounded-full bg-primary text-white uppercase tracking-widest shadow-[0_0_20px_rgba(236,91,19,0.3)]">
                        INTENTO: 01
                    </span>
                </div>

                <div id="history-grid"
                    class="flex-1 flex flex-col gap-1 lg:gap-2 overflow-y-auto px-4 custom-scrollbar">
                    <!-- Filas inyectadas -->
                </div>
            </aside>

            <!-- COLUMNA DERECHA (Juego) -->
            <section
                class="flex flex-col justify-start lg:justify-center gap-2 lg:gap-4 min-h-0">

                <div class="text-center shrink-0">
                    <div id="victory-header" style="display: none;" class="animate-pop mb-0">
                        <h2 class="text-2xl lg:text-4xl font-black text-yellow-400 tracking-tighter uppercase">¡ORDEN
                            EXACTO!</h2>
                    </div>
                    <div id="failure-header" style="display: none;" class="animate-pop mb-0">
                        <h2 class="text-2xl lg:text-4xl font-black text-red-500 tracking-tighter uppercase">¡FIN DEL
                            JUEGO!</h2>
                    </div>

                    <h1 id="game-title"
                        class="text-2xl lg:text-5xl font-black tracking-tighter text-white uppercase mb-0 pb-0">
                        Descubre el <span class="text-primary italic">Orden</span>
                    </h1>
                </div>

                <!-- Hidden Sequence Area -->
                <div id="hidden-container"
                    class="glass-panel rounded-2xl py-4 lg:px-1 bg-white/5 border-white/10 mx-auto w-full max-w-sm shadow-2xl">
                    <div id="hidden-zone" class="flex justify-center gap-4 lg:gap-8">
                        <div class="mystery-slot" data-index="0"><span
                                class="material-symbols-outlined text-xl">question_mark</span></div>
                        <div class="mystery-slot" data-index="1"><span
                                class="material-symbols-outlined text-xl">question_mark</span></div>
                        <div class="mystery-slot" data-index="2"><span
                                class="material-symbols-outlined text-xl">question_mark</span></div>
                        <div class="mystery-slot" data-index="3"><span
                                class="material-symbols-outlined text-xl">question_mark</span></div>
                    </div>
                </div>

                <div class="text-center">
                    <p id="feedback" style="display: block;" class="text-lg lg:text-lg mb-0 lg:mb-0 text-slate-400 font-medium italic">
                        Elige el orden de los colores...
                    </p>
                </div>

                <!-- Color Selection Area -->
                <div id="selection-container"
                    class="glass-panel rounded-2xl py-4 bg-white/5 border-white/10 mx-auto w-full max-w-sm shadow-2xl">
                    <div id="player-slots" class="flex justify-center gap-4 lg:gap-8">
                        <!-- Botones de colores -->
                    </div>
                </div>

                <!-- Reset Action -->
                <div id="reset-container" class="flex justify-center mt-2" style="display: none;">
                    <button onclick="location.reload()"
                        class="px-6 py-2 bg-primary text-white font-black text-xs lg:text-sm rounded-full shadow-[0_0_20px_rgba(236,91,19,0.3)] hover:scale-105 transition-all uppercase tracking-widest">
                        Jugar de Nuevo
                    </button>
                </div>

            </section>
        </main>

        <!-- Background Orbs -->
        <div
            class="absolute -top-[5%] -left-[5%] size-[300px] bg-primary/15 blur-[100px] rounded-full pointer-events-none">
        </div>
    </div>
</body>

</html>
