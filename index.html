<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acierte los Colores - Mastermind Pro</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="font-display bg-background-dark text-slate-100 h-screen overflow-hidden selection:bg-primary/30">
    <div class="relative h-full flex flex-col bg-gradient-radial">

        <main
            class="flex-1 max-w-7xl mx-auto px-4 py-1 grid grid-cols-1 lg:grid-cols-12 lg:grid-rows-none gap-0 lg:gap-6 w-full min-h-0 overflow-hidden">

            <!-- Side Panel: History -->
            <aside class="lg:col-span-4 flex flex-col max-h-[35vh] pb-0 pt-1">
                <div class="flex items-center p-2 px-4 shrink-0">
                    <span id="attempt-badge"
                        class="text-lg font-black px-4 py-1.5 rounded-full bg-primary text-white uppercase tracking-widest shadow-[0_0_20px_rgba(236,91,19,0.3)]">
                        INTENTO: 01
                    </span>
                </div>

                <div id="history-grid" class="flex flex-col justify-center gap-1 lg:gap-2 overflow-hidden px-4">
                    <!-- 10 rows will be injected here via JS -->
                </div>
            </aside>

            <!-- Main Interaction Zone -->
            <section
                class="lg:col-span-8 flex flex-col justify-start lg:justify-center gap-1 pt-0 lg:gap-6 min-h-0 py-0 lg:py-2">

                <div class="text-center">
                    <!-- Dynamic Headers -->
                    <div id="victory-header" style="display: none;" class="animate-pop mb-1 text-center w-full">
                        <h2
                            class="text-2xl lg:text-4xl font-black text-yellow-400 tracking-tighter shadow-yellow-500/20 text-center">
                            ¡FELICITACIONES!</h2>
                    </div>
                    <div id="failure-header" style="display: none;" class="animate-pop mb-1 text-center w-full">
                        <h2 class="text-2xl lg:text-4xl font-black text-red-500 tracking-tighter text-center">¡FIN DEL
                            JUEGO!</h2>
                    </div>

                    <h1 id="game-title"
                        class="text-3xl lg:text-5xl font-black tracking-tighter text-white text-center pt-1 my-0">
                        Descubre el <span class="text-primary italic">Orden</span>
                    </h1>
                </div>

                <!-- Hidden Sequence Area -->
                <div id="hidden-container"
                    class="glass-panel rounded-2xl lg:rounded-3xl p-2 lg:p-5 bg-white/5 border-white/10 mx-auto w-full max-w-sm shadow-2xl">
                    <div id="hidden-zone" class="flex justify-center gap-5 lg:gap-6">
                        <div class="mystery-slot" data-index="0">
                            <span class="material-symbols-outlined text-xl lg:text-3xl">question_mark</span>
                        </div>
                        <div class="mystery-slot" data-index="1">
                            <span class="material-symbols-outlined text-xl lg:text-3xl">question_mark</span>
                        </div>
                        <div class="mystery-slot" data-index="2">
                            <span class="material-symbols-outlined text-xl lg:text-3xl">question_mark</span>
                        </div>
                        <div class="mystery-slot" data-index="3">
                            <span class="material-symbols-outlined text-xl lg:text-3xl">question_mark</span>
                        </div>
                    </div>
                </div>

                <div class="text-center">
                    <p id="feedback" class="text-lg lg:text-lg mb-1 text-slate-400 font-medium italic">
                        Elige el orden de los colores...
                    </p>
                </div>

                <!-- Color Selection Area -->
                <div id="selection-container"
                    class="glass-panel rounded-2xl lg:rounded-3xl p-2 lg:p-5 bg-white/5 border-white/10 mx-auto w-full max-w-sm shadow-2xl">
                    <div id="player-slots" class="flex justify-center gap-5 lg:gap-6">
                        <!-- Tokens injected via JS -->
                    </div>
                </div>

                <!-- Global Reset Action -->
                <div id="reset-container" class="flex justify-center mt-1 lg:mt-0" style="display: none;">
                    <button onclick="location.reload()"
                        class="px-6 py-2 bg-primary text-white font-black text-xs lg:text-sm rounded-full shadow-[0_0_20px_rgba(236,91,19,0.3)] hover:shadow-[0_0_30px_rgba(236,91,19,0.5)] hover:scale-105 transition-all uppercase tracking-widest">
                        Jugar de Nuevo
                    </button>
                </div>

            </section>
        </main>

        <!-- Background Decorative Orbs -->
        <div
            class="absolute -top-[5%] -left-[5%] size-[400px] bg-primary/20 blur-[120px] rounded-full pointer-events-none">
        </div>
        <div
            class="absolute -bottom-[5%] -right-[5%] size-[500px] bg-blue-600/10 blur-[150px] rounded-full pointer-events-none">
        </div>
    </div>

    <!-- Logic Script -->
</body>

</html>
