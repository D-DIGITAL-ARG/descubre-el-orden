<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acierte los Colores - Mastermind Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="font-display bg-background-dark text-slate-100 h-screen overflow-hidden">
    <div class="h-full flex flex-col">

        <main class="flex-1 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-0 lg:gap-8 overflow-hidden p-4">

            <aside class="flex flex-col lg:col-span-4 min-h-0 max-h-[30vh] lg:max-h-full overflow-hidden">
                <div class="flex items-center shrink-0 mb-2">
                    <span id="attempt-badge" class="text-base font-black px-4 py-1 rounded-full bg-primary text-white uppercase shadow-[0_0_20px_rgba(236,91,19,0.3)]">
                        INTENTO: 01
                    </span>
                </div>
                <div id="history-grid" class="flex-1 flex flex-col gap-1 overflow-y-auto custom-scrollbar">
                </div>
            </aside>

            <section class="lg:col-span-8 flex flex-col justify-start lg:justify-center items-center min-h-0 mt-4 lg:mt-0">
                
                <div class="text-center shrink-0">
                    <h1 id="game-title" class="text-2xl lg:text-5xl font-black text-white uppercase m-0 p-0">
                        Descubre el <span class="text-primary italic">Orden</span>
                    </h1>
                </div>

                <div id="hidden-container" class="glass-panel rounded-2xl p-4 bg-white/5 w-full max-w-sm mt-2">
                    <div id="hidden-zone" class="flex justify-center gap-4">
                        </div>
                </div>

                <p id="feedback" class="text-sm my-2 text-slate-400 italic">Elige el orden...</p>

                <div id="selection-container" class="glass-panel rounded-2xl p-4 bg-white/5 w-full max-w-sm">
                    <div id="player-slots" class="flex justify-center gap-4">
                        </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
