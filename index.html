<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acierte los Colores - Juego de Lógica</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-container">
        <aside class="history-panel">
            <div id="attempt-counter"
                style="font-weight: 800; font-size: 1.2rem; padding-left: 1rem; letter-spacing: 0.8px;">
                INTENTO: 01
            </div>
            <div id="history-grid" class="history-grid">
                <!-- 10 rows of 4 circles will be injected here -->
            </div>
        </aside>

        <main class="interaction-zone">
            <div class="interaction-zone-header">
                <h2 id="victory-message"
                    style="display: none; color: var(--neon-yellow); font-weight: 900; font-size: 2.5rem; margin-bottom: 10px; animation: popIn 1s ease-out;">
                    ¡FELICITACIONES!</h2>
                <h2 id="end-message"
                    style="display: none; color: var(--neon-yellow); font-weight: 900; font-size: 2.5rem; margin-bottom: 10px; animation: popIn 1s ease-out;">
                    ¡FIN DEL JUEGO!</h2>
                <h1 id="game-title" style="display: allow">Descubre el orden</h1>
            </div>
            <div class="hidden-zone" id="hidden-zone">
                <div class="mystery-slot" data-index="0">?</div>
                <div class="mystery-slot" data-index="1">?</div>
                <div class="mystery-slot" data-index="2">?</div>
                <div class="mystery-slot" data-index="3">?</div>
            </div>
            <div id="feedback" class="feedback-message">Para comenzar selecciona los colores en el orden deseado...
            </div>
            <div class="slots-container" id="player-slots" style="display: allow">
                <!-- Tokens will be injected here via JS -->
            </div>
            <button id="reset-btn" class="confirm-btn" style="display: none; margin-top: 20px;"
                onclick="location.reload()">Jugar de Nuevo</button>
        </main>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>

</html>
